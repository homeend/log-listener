# log-listener template catalog. `log-listener init <app>...` resolves these
# for the current OS. version is compared against the online catalog.
version: 1

defaults:
  output: { color: true, drop_unmatched: false }
  tui: { enabled: true, scrollback: 20000 }

fragments:
  # The shared JetBrains discovery parameterized by {product}. Newest scheme first, legacy second.
  # linux primary is the IDE's runtime log dir under ~/.cache; the {product}* glob
  # spans co-installed versions (e.g. IntelliJIdea2026.1 and 2026.2). The Toolbox
  # install-dir path is kept as a legacy fallback.
  jetbrains-base:
    sources:
      - id: main
        filter: '^(idea\.log(\.\d+)?)$'
        locations:
          - dir:
              linux:   '~/.cache/JetBrains/{product}*/log'
              darwin:  '~/Library/Logs/JetBrains/{product}*'
              windows: '%LOCALAPPDATA%/JetBrains/{product}*/log'
          - dir:
              linux:   '~/.local/share/JetBrains/Toolbox/apps/{product}*/log'
  # Junie<->IDE bridge logs, physically inside a JetBrains product's log dir.
  junie-acp:
    sources:
      - id: junie-acp
        filter: 'acp.*\.log$'
        locations:
          - dir:
              linux:   '~/.cache/JetBrains/{product}*/log/acp'
              darwin:  '~/Library/Logs/JetBrains/{product}*/acp'
              windows: '%LOCALAPPDATA%/JetBrains/{product}*/log/acp'
          - dir:
              linux:   '~/.local/share/JetBrains/Toolbox/apps/{product}*/log/acp'
  # Junie agent's own logs.
  junie-logs:
    sources:
      - id: junie-logs
        filter: '\.log$'
        locations:
          - dir:
              linux:   '~/.junie/logs'
              darwin:  '~/Library/Logs/junie'
              windows: '%USERPROFILE%/.junie/logs'
          - dir:
              linux:   '~/.junie-local/logs'
              darwin:  '~/Library/Logs/junie-local'
              windows: '%USERPROFILE%/.junie-local/logs'

apps:
  goland:
    renderers: [json-line, idea-trailing-json]
    use:
      - { frag: jetbrains-base, product: GoLand }
      - { frag: junie-acp,   product: GoLand }
  idea:
    renderers: [json-line, idea-trailing-json]
    use:
      - { frag: jetbrains-base, product: IntelliJIdea }
      - { frag: junie-acp,   product: IntelliJIdea }
  pycharm:
    renderers: [json-line, idea-trailing-json]
    use:
      - { frag: jetbrains-base, product: PyCharm }
      - { frag: junie-acp,   product: PyCharm }
  webstorm:
    renderers: [json-line, idea-trailing-json]
    use:
      - { frag: jetbrains-base, product: WebStorm }
      - { frag: junie-acp,   product: WebStorm }
  junie:
    use:
      - { frag: junie-logs }
      - { frag: junie-acp, product: IntelliJIdea }

renderers:
  json-line:
    line_regex: '^\s*(\{.*\})\s*$'
    template: '$json($1)'
  idea-trailing-json:
    line_regex: '^(.*?\s)(\{.+\})\s*$'
    template: '$1\n$json($2)'

bundles:
  jetbrains: [goland, idea, pycharm, webstorm]
